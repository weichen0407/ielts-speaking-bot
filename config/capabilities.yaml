version: 1
description: >
  Canonical capability registry for modes, triggers, subagents, processors,
  tools, and runtime outputs. Treat this as the first place to check before
  adding or renaming a capability.

runtime_roots:
  user_data: persona
  observability: monitor
  global_notes: user-notes

models:
  deepseek-v4-flash:
    provider: deepseek
    model_name: deepseek-v4-flash
    intended_use: default low-cost processor and subagent model
    context_window: 64000
    default_max_tokens: 1200
    input_cost_per_1m: 0.14
    cached_input_cost_per_1m: 0.0028
    output_cost_per_1m: 0.28
    cost_tier: low
    notes: Used for current processor-mediated subagents and background analysis.

modes:
  default:
    trigger_file: mode/default/trigger/triggers.json
    subagents: [memory_cron, daily_consolidator]
  freechat:
    context_dir: mode/freechat/context
    trigger_file: mode/freechat/trigger/triggers.json
    cron_file: mode/freechat/trigger/cron/cron.yaml
    subagents: [vocab, polisher]
  ielts:
    context_dir: mode/ielts/context
    trigger_file: mode/ielts/trigger/triggers.json
    cron_file: mode/ielts/trigger/cron/cron.yaml
    subagents: [ielts_feedback]
  benative:
    context_dir: mode/benative/context
    trigger_file: mode/benative/trigger/triggers.json
    cron_file: mode/benative/trigger/cron/cron.yaml
    subagents: [benative_article, benative_review]

subagents:
  vocab:
    scope: single_session
    prompt: subagent/single_session/vocab/context/vocab_subagent.md
    trigger_ids: [freechat_vocab]
    execution_modes: [api, agentic]
    default_execution_mode: api
    tools:
      api: []
      agentic: [thread_query, artifact_read, user_profile, wiki_query]
    writes:
      - persona/memory/MEMORY.md
      - persona/sessions/{session_uuid}/notes/vocab.md
  polisher:
    scope: single_session
    prompt: subagent/single_session/polisher/context/polisher_subagent.md
    trigger_ids: [freechat_polisher]
    execution_modes: [api, agentic]
    default_execution_mode: api
    tools:
      api: []
      agentic: [thread_query, artifact_read, user_profile]
    writes:
      - persona/memory/MEMORY.md
      - persona/sessions/{session_uuid}/notes/polisher.md
  benative_article:
    scope: cross_session
    prompt: subagent/cross_session/benative_article/context/benative_article_subagent.md
    trigger_ids: [benative_article]
    execution_modes: [api, agentic]
    default_execution_mode: api
    tools:
      api: []
      agentic: [user_profile, wiki_query, thread_query, artifact_read]
    writes:
      - persona/benative/articles/{article_id}.json
      - persona/benative/pairs/{article_id}.jsonl
      - persona/benative/entities/{article_id}.jsonl
      - persona/processor/benative/article.jsonl
  ielts_feedback:
    scope: single_session
    prompt: subagent/single_session/ielts_feedback/context/ielts_feedback_subagent.md
    trigger_ids: [ielts_feedback]
    writes:
      - persona/sessions/{session_uuid}/notes/ielts_feedback.md
  benative_review:
    scope: single_session
    prompt: subagent/single_session/benative_review/context/benative_review_subagent.md
    trigger_ids: [benative_review]
    execution_modes: [api, agentic]
    default_execution_mode: api
    tools:
      api: []
      agentic: [user_profile, wiki_query, thread_query, artifact_read]
    writes:
      - persona/processor/benative/review.jsonl
      - persona/sessions/{session_uuid}/notes/benative_review.md
  memory_cron:
    scope: cross_session
    prompt: subagent/cross_session/memory_cron/context/memory_cron_subagent.md
    trigger_ids: [memory_cron]
    writes:
      - persona/memory/MEMORY.md
  daily_consolidator:
    scope: cross_session
    prompt: subagent/cross_session/daily_consolidator/context/daily_consolidator_subagent.md
    trigger_ids: [daily_consolidator]
    writes:
      - subagent/cross_session/daily_consolidator/data/daily/daily_{date}.md
processors:
  wiki:
    path: subagent/cross_session/wiki/processor
    status: active
    artifact_type: mixed
    runtime_root: persona/wiki
    sync:
      source: persona/events/thread.jsonl
      interval: 1
      allowed_modes: [freechat]
      allowed_roles: [user]
      interval_env: NANOBOT_WIKI_SYNC_INTERVAL
      modes_env: NANOBOT_WIKI_SYNC_MODES
      llm_extractor_env: NANOBOT_WIKI_LLM_EXTRACTOR
  vocab:
    path: subagent/single_session/vocab/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/freechat/vocab.jsonl
    mode_outputs:
      freechat: persona/processor/freechat/vocab.jsonl
  polisher:
    path: subagent/single_session/polisher/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/freechat/polisher.jsonl
    mode_outputs:
      freechat: persona/processor/freechat/polisher.jsonl
  benative_article:
    path: subagent/cross_session/benative_article/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/benative/article.jsonl
    runtime_root: persona/benative
  benative_review:
    path: subagent/single_session/benative_review/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/benative/review.jsonl
  progress_tracker:
    path: subagent/cross_session/progress_tracker/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/freechat/progress_tracker.jsonl
  progress_organizer:
    path: subagent/cross_session/progress_organizer/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/freechat/progress_organizer.jsonl
  review:
    path: subagent/cross_session/review/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/freechat/review.jsonl
  notes:
    path: subagent/single_session/notes/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/freechat/notes.jsonl
  quiz:
    path: subagent/single_session/quiz/processor
    status: active
    artifact_type: jsonl
    output: persona/processor/freechat/quiz.jsonl

tools:
  thread_query:
    status: active
    scope: read_only
    description: Read recent or historical conversation turns from approved thread logs.
    permissions: [read_thread]
    timeout_ms: 2000
    input_schema:
      query: string
      role: string
      limit: integer
    output_schema:
      status: string
      messages: array
      count: integer
    audit_log_fields: [timestamp, tool, status, query, role, limit, count]
  artifact_read:
    status: active
    scope: read_only
    description: Read processor artifacts such as vocab.jsonl and polisher.jsonl.
    permissions: [read_artifacts]
    timeout_ms: 2000
    input_schema:
      artifact: string
      path: string
      limit: integer
    output_schema:
      status: string
      path: string
      rows: array
      content: string
    audit_log_fields: [timestamp, tool, status, artifact, path, limit]
  user_profile:
    status: active
    scope: read_only
    description: Read stable user profile, memory, habits, and recurring learning patterns.
    permissions: [read_user_profile]
    timeout_ms: 1500
    input_schema:
      section: string
    output_schema:
      status: string
      files: object
    audit_log_fields: [timestamp, tool, status, section]
  wiki_query:
    status: active
    scope: read_only
    description: Query local LLM Wiki pages, graph, entities, concepts, and gaps.
    permissions: [read_wiki]
    timeout_ms: 2500
    input_schema:
      query: string
      mode: string
      topic: string
      page_type: string
      limit: integer
    output_schema:
      status: string
      results: array
      count: integer
    audit_log_fields: [timestamp, tool, status, query, mode, topic, page_type, limit, count]

budgets:
  daily:
    freechat_usd: 0.25
    benative_usd: 0.25
    wiki_sync_usd: 0.10
    background_usd: 0.15
  per_session:
    max_processor_runs: 40
    max_agentic_subagent_runs: 12
  processors:
    dry_run_env: NANOBOT_PROCESSOR_DRY_RUN

observability:
  trigger_decisions:
    path: monitor/trigger_decisions.jsonl
    rotation: size_10_mib_keep_10
  subagent_runs:
    path: monitor/subagent_runs.jsonl
    rotation: size_10_mib_keep_10
  processor_runs:
    path: monitor/processor_runs.jsonl
    rotation: size_10_mib_keep_10

deprecated:
  subagents:
    progress_tracker:
      replacement: processors.progress_tracker
      reason: superseded by deterministic processor pipeline and processor cursor logs
    benative_article_fetcher:
      replacement: subagents.benative_article
      reason: superseded by processor-mediated article preparation capability
    benative_translator:
      replacement: subagents.benative_article
      reason: translation is now part of the Be Native article preparation capability
  wiki_sync:
    path: persona/wiki/state/sync_log.jsonl

version: 1
triggers:
  # ========== Level 2 Processors (single session) ==========
  - id: vocab_processor
    name: "Vocab Processor"
    enabled: true
    condition:
      kind: file_line_count
      count: 50
      path: data/thread.jsonl
    target:
      processor: vocab
      input_path: data/thread.jsonl
      output_path: subagent/single_session/vocab/data/vocab.jsonl
      batch_size: 50

  - id: polisher_processor
    name: "Polisher Processor"
    enabled: true
    condition:
      kind: file_line_count
      count: 50
      path: data/thread.jsonl
    target:
      processor: polisher
      input_path: data/thread.jsonl
      output_path: subagent/single_session/polisher/data/polisher.jsonl
      batch_size: 50

  - id: notes_processor
    name: "Notes Processor"
    enabled: true
    condition:
      kind: file_line_count
      count: 50
      path: data/thread.jsonl
    target:
      processor: notes
      input_path: data/thread.jsonl
      output_path: subagent/single_session/notes/data/notes.jsonl
      batch_size: 50

  # ========== Level 3 Processors (cross session) ==========
  - id: kg_builder
    name: "Knowledge Graph Builder"
    enabled: true
    condition:
      kind: file_line_count
      count: 50
      path: subagent/single_session/vocab/data/vocab.jsonl
    target:
      subagent: kg_subagent
      prompt_file: subagent/cross_session/kg/md/kg_subagent.md
      depends_on:
        - vocab_processor
        - polisher_processor
        - notes_processor
      model: "gpt-4o-mini"
      task_template: |
        Build knowledge graph from processed Level 2 files.

        Read new content from Level 2 files since last cursor:
        {source_files}

        Content to process:
        {content}

        Output entities and relations in the specified format.
        Write to: {workspace}/subagent/cross_session/kg/data/entity_database.json
        Update cursor: {workspace}/subagent/_cursors/cross_session/kg/.cursor.json

  - id: review_builder
    name: "Review Builder"
    enabled: true
    condition:
      kind: file_line_count
      count: 50
      path: subagent/single_session/vocab/data/vocab.jsonl
    target:
      subagent: review_subagent
      prompt_file: subagent/cross_session/review/md/review_subagent.md
      depends_on:
        - vocab_processor
        - polisher_processor
        - notes_processor
      model: "gpt-4o-mini"
      task_template: |
        Extract knowledge points from Level 2 files for review.

        Read new content from Level 2 files since last cursor:
        {source_files}

        Content to process:
        {content}

        Output review points in the specified format.
        Write to: {workspace}/subagent/cross_session/review/data/review_points.jsonl
        Update index: {workspace}/subagent/cross_session/review/data/review_index.json
        Update cursor: {workspace}/subagent/_cursors/cross_session/review/.cursor.json

  # ========== Cron Triggers ==========
  - id: memory_cron
    name: "Memory Cron"
    enabled: true
    condition:
      kind: cron
      count: "0 0 * * *"
      scope: global
    target:
      subagent: memory_cron_subagent
      prompt_file: subagent/cross_session/memory_cron/md/memory_cron_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Update user memory profile based on sessions modified since last run.

        Modified sessions (JSON):
        {modified_sessions}

        Read each session's thread.jsonl and extract NEW facts/preferences.
        Merge into {workspace}/persona/memory/MEMORY.md.

        Only process messages newer than cursor timestamp.

  - id: daily_consolidator
    name: "Daily Consolidator"
    enabled: true
    condition:
      kind: cron
      count: "0 */8 * * *"
      scope: global
    target:
      subagent: daily_consolidator_subagent
      prompt_file: subagent/cross_session/daily_consolidator/md/daily_consolidator_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Aggregate vocab.md and polisher.md from sessions modified since last run.

        Modified sessions (JSON):
        {modified_sessions}

        Write to: {workspace}/subagent/cross_session/daily_consolidator/data/daily/daily_{date}.md

  - id: progress_tracker
    name: "Progress Tracker"
    enabled: true
    condition:
      kind: file_line_count
      count: 2
      path: persona/user_responses.jsonl
    target:
      subagent: progress_tracker_subagent
      prompt_file: subagent/cross_session/progress_tracker/md/progress_tracker_subagent.md
      depends_on: null
      model: "gpt-4o-mini"
      task_template: |
        Analyze new user responses since last run and extract meaningful highlights.

        Read: {workspace}/persona/user_responses.jsonl
        Call: save_progress_entries tool with analyzed entries

  - id: benative_article_fetcher
    name: "Benative Article Fetcher"
    enabled: true
    condition:
      kind: cron
      count: "0 12 * * *"
      scope: global
    target:
      subagent: benative_article_fetcher_subagent
      prompt_file: subagent/cross_session/benative_article_fetcher/md/benative_article_fetcher_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Fetch news articles for benative mode practice.

        Articles directory: {workspace}/mode/benative/data/benative/articles/
        Write article JSON files and update cursor.

  - id: benative_translator
    name: "Benative Translator"
    enabled: true
    condition:
      kind: cron
      count: "0 13 * * *"
      scope: global
    target:
      subagent: benative_translator_subagent
      prompt_file: subagent/cross_session/benative_translator/md/benative_translator_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Translate untranslated benative articles.

        Articles directory: {workspace}/mode/benative/data/benative/articles/
        Pairs directory: {workspace}/mode/benative/data/benative/pairs/

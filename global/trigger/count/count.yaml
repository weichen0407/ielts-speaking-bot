version: 1
triggers:
  # Global triggers - run regardless of mode
  - id: memory_cron
    name: "Memory Cron"
    enabled: true
    condition:
      kind: cron
      count: "0 0 * * *"
      scope: global
    target:
      subagent: memory_cron_subagent
      prompt_file: subagents/cross_session/memory_cron_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Update user memory profile based on sessions modified since last run.

        Modified sessions (JSON):
        {modified_sessions}

        Read each session's thread.jsonl and extract NEW facts/preferences.
        Merge into {workspace}/shared/memory/MEMORY.md.

        Only process messages newer than cursor timestamp.

  - id: daily_consolidator
    name: "Daily Consolidator"
    enabled: true
    condition:
      kind: cron
      count: "0 */8 * * *"
      scope: global
    target:
      subagent: daily_consolidator_subagent
      prompt_file: subagents/cross_session/daily_consolidator_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Aggregate vocab.md and polisher.md from sessions modified since last run.

        Modified sessions (JSON):
        {modified_sessions}

        Write to: {workspace}/shared/daily/daily_{date}.md

  - id: progress_tracker
    name: "Progress Tracker"
    enabled: true
    condition:
      kind: file_line_count
      count: 2
      path: shared/user_responses.jsonl
    target:
      subagent: progress_tracker_subagent
      prompt_file: subagents/cross_session/progress_tracker_subagent.md
      depends_on: null
      model: "gpt-4o-mini"
      task_template: |
        Analyze new user responses since last run and extract meaningful highlights.

        Read: {workspace}/shared/user_responses.jsonl
        Call: save_progress_entries tool with analyzed entries

  - id: benative_article_fetcher
    name: "Benative Article Fetcher"
    enabled: true
    condition:
      kind: cron
      count: "0 12 * * *"
      scope: global
    target:
      subagent: benative_article_fetcher_subagent
      prompt_file: subagents/cross_session/benative_article_fetcher_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Fetch news articles for benative mode practice.

        Articles directory: {workspace}/shared/benative/articles/
        Write article JSON files and update cursor.

  - id: benative_translator
    name: "Benative Translator"
    enabled: true
    condition:
      kind: cron
      count: "0 13 * * *"
      scope: global
    target:
      subagent: benative_translator_subagent
      prompt_file: subagents/cross_session/benative_translator_subagent.md
      model: "gpt-4o-mini"
      task_template: |
        Translate untranslated benative articles.

        Articles directory: {workspace}/shared/benative/articles/
        Pairs directory: {workspace}/shared/benative/pairs/

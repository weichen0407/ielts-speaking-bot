version: 1
cron_jobs:
  - id: dream
    name: dream
    enabled: true
    schedule:
      kind: every
      everyMs: 7200000

  - id: memory_cron
    name: memory_cron
    enabled: true
    schedule:
      kind: cron
      expr: "0 0 * * *"

  - id: daily_consolidator
    name: daily_consolidator
    enabled: true
    schedule:
      kind: cron
      expr: "0 */8 * * *"

  - id: benative_article_fetcher
    name: benative_article_fetcher
    enabled: true
    schedule:
      kind: cron
      expr: "0 12 * * *"

  - id: benative_translator
    name: benative_translator
    enabled: true
    schedule:
      kind: cron
      expr: "0 13 * * *"

version: 1
triggers:
  # Review subagent - fires every N sentences (configurable via session.metadata["benative_review_count"])
  - id: benative_review
    name: "Benative Review"
    enabled: true
    condition:
      kind: turn_count
      count: 10
      scope: session
    target:
      subagent: benative_review_subagent
      prompt_file: subagents/session/benative_review_subagent.md
      silent: true
      model: "gpt-4o-mini"
      task_template: |
        Review recent benative user responses and compare with original English.

        Session directory: {session_dir}/notes/
        Workspace: {workspace}

        1. Read benative_progress.json to get article_id
        2. Read user responses from: {workspace}/shared/benative/sessions/<session_uuid>/responses.jsonl
           (session_uuid is the folder name in session_dir path)
        3. Read original sentences from: {workspace}/shared/benative/pairs/<article_id>.jsonl

        Output review to: {session_dir}/notes/benative_review.md

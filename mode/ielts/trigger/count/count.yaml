version: 1
triggers:
  # Mode-specific triggers - only run when this mode is active
  - id: vocab_analysis
    name: "Vocabulary Analysis"
    enabled: true
    condition:
      kind: turn_count
      count: 2
      scope: session
    target:
      subagent: vocab_subagent
      prompt_file: subagents/session/vocab_subagent.md
      silent: true
      task_template: |
        Analyze the conversation history and update vocabulary suggestions.

        Session directory: {session_dir}/notes/
        Read: {session_dir}/thread.jsonl
        Write to: {session_dir}/notes/vocab.md

  - id: polish_feedback
    name: "Polish Feedback"
    enabled: true
    condition:
      kind: turn_count
      count: 3
      scope: session
    target:
      subagent: polisher_subagent
      prompt_file: subagents/session/polisher_subagent.md
      silent: true
      task_template: |
        Analyze recent user messages and show optimized versions with diff.

        Session directory: {session_dir}/notes/
        Read: {session_dir}/thread.jsonl
        Write to: {session_dir}/notes/polisher.md

  - id: ielts_feedback
    name: "IELTS Feedback"
    enabled: true
    condition:
      kind: turn_count
      count: 5
      scope: session
    target:
      subagent: ielts_feedback_subagent
      prompt_file: subagents/session/ielts_feedback_subagent.md
      silent: true
      model: "gpt-4o-mini"
      task_template: |
        Provide IELTS-specific feedback on the conversation.

        Session directory: {session_dir}/notes/
        Read: {session_dir}/thread.jsonl
        Write to: {session_dir}/notes/ielts_feedback.md

        Focus on:
        - IELTS speaking criteria (Fluency, Vocabulary, Grammar, Pronunciation)
        - Part 2 style extended responses
        - Complex sentence structures used correctly

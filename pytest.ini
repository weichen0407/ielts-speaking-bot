[pytest]
testpaths = bot/tests
pythonpath = bot
filterwarnings =
    ignore:pkg_resources is deprecated as an API:UserWarning:lark_oapi
    ignore:Deprecated call to `pkg_resources\.declare_namespace\('lark_oapi.*:DeprecationWarning
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated.*:DeprecationWarning:lark_oapi
    ignore:There is no current event loop:DeprecationWarning:lark_oapi
    ignore:websockets\.InvalidStatusCode is deprecated:DeprecationWarning:lark_oapi
    ignore:websockets\.legacy is deprecated.*:DeprecationWarning:websockets\.legacy
